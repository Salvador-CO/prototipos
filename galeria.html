<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Galería | Empresa Modelo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a252f;
            --accent: #007bff;
            --bg-light: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); }

        /* --- NAVEGACIÓN (Igual a las anteriores) --- */
        nav {
            background: rgba(26, 37, 47, 0.95);
            color: white; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 2000;
        }
        .nav-links { list-style: none; display: flex; gap: 25px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }
        .header-spacer { height: 80px; }

        /* --- DISEÑO DE LA GALERÍA --- */
        .container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        .gallery-header { text-align: center; margin-bottom: 50px; }
        .gallery-header h2 { font-size: 2.5rem; color: var(--primary); }
        .gallery-header p { color: #666; margin-top: 10px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            height: 250px;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Efecto Hover */
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 123, 255, 0.7);
            display: flex; justify-content: center; align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
            font-size: 2rem;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* --- LIGHTBOX (Zoom / Vista Expandida) --- */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 20px;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-lightbox {
            position: absolute;
            top: 30px; right: 40px;
            color: white; font-size: 2.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-lightbox:hover { color: var(--accent); }

        /* Responsivo */
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo"><i class="fas fa-rocket"></i> LOGO</div>
    <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>

<!-- Estructura del Lightbox (Zoom) -->
<div id="lightbox" class="lightbox">
    <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
    <img id="lightbox-img" src="" alt="Zoom">
</div>

<script>
    function openLightbox(imgUrl) {
        document.getElementById('lightbox-img').src = imgUrl;
        document.getElementById('lightbox').style.display = 'flex';
        // Bloquear scroll del body al abrir zoom
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        // Reactivar scroll
        document.body.style.overflow = 'auto';
    }

    // Cerrar también si se hace clic fuera de la imagen
    window.onclick = function(event) {
        let lightbox = document.getElementById('lightbox');
        if (event.target == lightbox) {
            closeLightbox();
        }
    }
</script>
